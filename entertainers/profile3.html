<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MrBeast – Entertainers Exchange</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../theme.js" defer></script>
  <script>
    const match = window.location.pathname.match(/profile(\d+)\.html$/);
    const id = match ? Number(match[1]) : 0;
    window.location.replace(id ? `../profile.html?id=${id}` : "../index.html");
  </script>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <h1>MrBeast</h1>
        <p class="hero-text">YouTube creator and entrepreneur.</p>
      </div>
    </header>
    <main>
      <div class="artist-detail-card">
        <div class="artist-hero">
          <img src="../images/placeholder.svg" alt="MrBeast" class="artist-photo">
          <div>
            <h2>Price: $110</h2>
            <h3>Popularity: 97</h3>
            <p><strong>Projects:</strong> Beast Games, Feastables</p>
            <p><strong>Upcoming:</strong> Season 2</p>
            <div>
              <a href="https://instagram.com/mrbeast" target="_blank">Instagram</a> |
              <a href="https://x.com/MrBeast" target="_blank">X</a> |
              <a href="https://youtube.com/@MrBeast" target="_blank">YouTube</a>
            </div>
          </div>
        </div>
        <div class="artist-bio">
          <p>MrBeast is a YouTube creator and entrepreneur.</p>
        </div>
        <div class="artist-analytics">
          <h3>Price History</h3>
          <p>[95, 98, 102, 105, 110, 112, 110]</p>
        </div>
      </div>
      <a href="../index.html" class="card-link" style="margin-top:2em;display:inline-block;">&larr; Back to Home</a>
    </main>
  </div>
</body>
</html>
