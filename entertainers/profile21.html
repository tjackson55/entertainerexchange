<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entertainer 21 – Entertainers Exchange</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../theme.js" defer></script>
  <script>
    const match = window.location.pathname.match(/profile(\d+)\.html$/);
    const id = match ? Number(match[1]) : 0;
    window.location.replace(id ? `../profile.html?id=${id}` : "../index.html");
  </script>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <h1>Entertainer 21</h1>
        <p class="hero-text">Profile details coming soon.</p>
      </div>
    </header>
    <main>
      <div class="artist-detail-card">
        <div class="artist-hero">
          <img src="../images/placeholder.svg" alt="Entertainer 21" class="artist-photo">
          <div>
            <h2>Price: $0</h2>
            <h3>Popularity: 0</h3>
            <p><strong>Projects:</strong> N/A</p>
            <p><strong>Upcoming:</strong> N/A</p>
            <div>
              <span>Social links unavailable</span>
            </div>
          </div>
        </div>
        <div class="artist-bio">
          <p>More information will be available soon.</p>
        </div>
        <div class="artist-analytics">
          <h3>Price History</h3>
          <p>[0, 0, 0, 0, 0, 0, 0]</p>
        </div>
      </div>
      <a href="../index.html" class="card-link" style="margin-top:2em;display:inline-block;">&larr; Back to Home</a>
    </main>
  </div>
</body>
</html>
