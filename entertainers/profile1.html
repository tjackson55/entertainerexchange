<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taylor Swift – Entertainers Exchange</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../theme.js" defer></script>
  <script>
    const match = window.location.pathname.match(/profile(\d+)\.html$/);
    const id = match ? Number(match[1]) : 0;
    window.location.replace(id ? `../profile.html?id=${id}` : "../index.html");
  </script>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <h1>Taylor Swift</h1>
        <p class="hero-text">Singer-songwriter and global icon.</p>
      </div>
    </header>
    <main>
      <div class="artist-detail-card">
        <div class="artist-hero">
          <img src="../images/placeholder.svg" alt="Taylor Swift" class="artist-photo">
          <div>
            <h2>Price: $145</h2>
            <h3>Popularity: 99</h3>
            <p><strong>Projects:</strong> 1989, Midnights, Lover</p>
            <p><strong>Upcoming:</strong> Eras Tour 2026</p>
            <div>
              <a href="https://instagram.com/taylorswift" target="_blank">Instagram</a> |
              <a href="https://x.com/taylorswift13" target="_blank">X</a> |
              <a href="https://youtube.com/@TaylorSwift" target="_blank">YouTube</a>
            </div>
          </div>
        </div>
        <div class="artist-bio">
          <p>Taylor Swift is a singer-songwriter and global icon.</p>
        </div>
        <div class="artist-analytics">
          <h3>Price History</h3>
          <p>[130, 135, 140, 145, 148, 146, 145]</p>
        </div>
      </div>
      <a href="../index.html" class="card-link" style="margin-top:2em;display:inline-block;">&larr; Back to Home</a>
    </main>
  </div>
</body>
</html>
