<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drake – Entertainers Exchange</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../theme.js" defer></script>
  <script>
    const match = window.location.pathname.match(/profile(\d+)\.html$/);
    const id = match ? Number(match[1]) : 0;
    window.location.replace(id ? `../profile.html?id=${id}` : "../index.html");
  </script>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <h1>Drake</h1>
        <p class="hero-text">Global rapper and chart-topping artist.</p>
      </div>
    </header>
    <main>
      <div class="artist-detail-card">
        <div class="artist-hero">
          <img src="../images/placeholder.svg" alt="Drake" class="artist-photo">
          <div>
            <h2>Price: $120</h2>
            <h3>Popularity: 98</h3>
            <p><strong>Projects:</strong> Views, Scorpion, For All The Dogs</p>
            <p><strong>Upcoming:</strong> Summer Tour 2026</p>
            <div>
              <a href="https://instagram.com/champagnepapi" target="_blank">Instagram</a> |
              <a href="https://x.com/Drake" target="_blank">X</a> |
              <a href="https://youtube.com/@DrakeOfficial" target="_blank">YouTube</a>
            </div>
          </div>
        </div>
        <div class="artist-bio">
          <p>Drake is a global rapper and chart-topping artist.</p>
        </div>
        <div class="artist-analytics">
          <h3>Price History</h3>
          <p>[110, 112, 115, 118, 120, 122, 120]</p>
        </div>
      </div>
      <a href="../index.html" class="card-link" style="margin-top:2em;display:inline-block;">&larr; Back to Home</a>
    </main>
  </div>
</body>
</html>
