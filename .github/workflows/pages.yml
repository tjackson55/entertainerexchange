name: Deploy Static Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build public artifact
        run: |
          mkdir -p dist
          cp index.html dist/
          cp style.css dist/
          cp theme.js dist/
          cp shared-catalog.js dist/
          cp data.js dist/
          cp profile.html dist/
          cp entertainers-11-30.html dist/
          cp entertainers-31-50.html dist/
          cp README.md dist/
          cp terms.html dist/
          cp privacy.html dist/
          cp disclaimer.html dist/
          cp -R images dist/images
          cp -R entertainers dist/entertainers

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
